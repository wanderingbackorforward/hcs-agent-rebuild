<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCS 测试辅助 Agent 平台</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f7fa;
        }
        h1 { color: #333; }
        #chat-box {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .message { margin-bottom: 12px; line-height: 1.5; }
        .user { color: #1a73e8; font-weight: bold; }
        .assistant { color: #333; }
        #input-row { display: flex; gap: 8px; }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            padding: 10px 18px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover { background: #1557b0; }
        .hint { color: #666; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>HCS 测试辅助 Agent 平台</h1>
    <div id="chat-box"></div>
    <div id="input-row">
        <input type="text" id="message-input" placeholder="请输入您的问题，例如：找一个 MySQL + Redis 的测试环境" />
        <button onclick="sendMessage()">发送</button>
    </div>
    <div class="hint">支持：HCS 测试环境匹配、SDK/手册/规范知识问答。</div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('message-input');
        let sessionId = localStorage.getItem('hcs_session_id') || null;

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'message ' + (role === 'user' ? 'user' : 'assistant');
            div.innerHTML = '<strong>' + (role === 'user' ? '您' : 'AI') + '：</strong>' + text.replace(/\n/g, '<br>');
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            appendMessage('user', text);
            input.value = '';

            const payload = { message: text };
            if (sessionId) payload.session_id = sessionId;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                if (data.session_id) {
                    sessionId = data.session_id;
                    localStorage.setItem('hcs_session_id', sessionId);
                }
                appendMessage('assistant', data.reply || '无回复');
            } catch (e) {
                appendMessage('assistant', '请求失败：' + e.message);
            }
        }

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
