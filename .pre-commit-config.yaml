# Pre-commit hooks. Run locally before every commit.
#
# Setup:
#   pip install pre-commit
#   pre-commit install
#
# Run on demand (e.g., before pushing):
#   pre-commit run --all-files
#
# Configured tools: ruff (lint+format), mypy (type), trailing whitespace + EOF.
# Black intentionally OMITTED — ruff format is faster and uses the same ruleset.
# Mirror the same rules in CI (.github/workflows/tests.yml).

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # Type-check a curated set of modules; the rest of the codebase
        # has too many Any-es from LangChain / FastAPI to type cleanly yet.
        files: ^(config|api)/.+\.py$
        additional_dependencies:
          - "pydantic>=2.5"
          - "types-requests"
        args: ["--ignore-missing-imports", "--no-strict-optional"]
