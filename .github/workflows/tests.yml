name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . || true   # warn-only for now; tighten in later round

      - name: Run tests (no live LLM)
        env:
          # CI never has real LLM keys; tests that need them self-skip.
          API_KEYS: ""
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/test_hybrid_search.py \
            --ignore=tests/test_task_classification_agent.py \
            -v

      - name: Run hybrid-search retrieval test (optional, MiniMax)
        # test_hybrid_search.py makes 30+ dense embedding API calls.
        # This step runs only if EMBEDDING_API_KEY is set as a secret.
        # Configure secrets in Settings > Secrets and variables > Actions.
        env:
          EMBEDDING_PROVIDER: minimax
          EMBEDDING_API_KEY: ${{ secrets.EMBEDDING_API_KEY }}
          EMBEDDING_BASE_URL: https://api.minimaxi.com/v1
          EMBEDDING_MODEL: embo-01
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        continue-on-error: true
        run: |
          if [ -z "$EMBEDDING_API_KEY" ]; then
            echo "::warning::EMBEDDING_API_KEY secret not set; skipping hybrid-search step."
            exit 0
          fi
          python -m pytest tests/test_hybrid_search.py -v
