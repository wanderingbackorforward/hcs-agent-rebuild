# docker-compose for local dev / small prod.
# Usage:
#   cp .env.example .env   # fill in API_KEYS, LLM_*, EMBEDDING_*
#   docker compose up --build
#
# This spins up the FastAPI app on :8000. The app uses an embedded
# (in-process) ChromaDB + FTS5 over SQLite + on-disk raw doc archive — no
# separate vector-store service is required for small prod.
# Redis is optional: set REDIS_URL to enable shared caching across instances.
# When you outgrow single-node, add a `chroma` service and switch
# VECTOR_STORE_PROVIDER accordingly.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hcs-agent-rebuild:dev
    container_name: hcs-agent-rebuild
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - hcs-data:/app/data
      - hcs-chroma:/app/.chroma
      - hcs-logs:/app/logs
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Redis for shared caching (ToolCache + SemanticCache).
  # If REDIS_URL is not set, the app falls back to in-process caches.
  redis:
    image: redis:7-alpine
    container_name: hcs-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hcs-redis:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  hcs-data:
  hcs-chroma:
  hcs-logs:
  hcs-redis:
